<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álvaro Iglesias Ávila | aiglea01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --card-bg: #111;
            --text-main: #f2f2f2;
            --text-muted: #888888;
            
            /* NUEVO COLOR DE ACENTO NARANJA VIBRANTE */
            --accent-color: #ff9f43; /* Naranja tech moderno */
            --accent-hover: #e68a2e;
            
            --border-muted: #222222;
            --animation-speed: 0.6s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding: 2rem;
            opacity: 0;
            animation: fadeInBody 1s ease-out forwards;
        }

        main {
            max-width: 680px;
            margin: 5rem auto;
        }

        /* --- Animaciones Keyframes --- */
        @keyframes fadeInBody {
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Estilos de Sección con Animación --- */
        header, section, footer {
            opacity: 0;
            animation: slideInUp var(--animation-speed) ease-out forwards;
        }

        header { animation-delay: 0.2s; margin-bottom: 5rem; text-align: center;}
        section:nth-of-type(1) { animation-delay: 0.4s; }
        section:nth-of-type(2) { animation-delay: 0.6s; }
        footer { animation-delay: 0.8s; }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.04em;
            color: var(--text-main);
        }

        .bio {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 580px;
            margin: 0 auto 1.5rem auto;
        }

        .bio a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid var(--border-muted);
            transition: all 0.3s ease;
        }

        .bio a:hover {
            /* COLOR EN ENLACES DE BIO */
            border-bottom-color: var(--accent-color);
            color: var(--accent-color);
        }

        section {
            margin-bottom: 4rem;
        }

        h2 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.6;
        }

        /* --- Project Grid & Cards --- */
        .project-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            /* COLOR EN BORDE Y SOMBRA DE TARJETA */
            border-color: var(--accent-color);
            background-color: #161616;
            box-shadow: 0 8px 30px rgba(255, 159, 67, 0.1); /* Brillo sutil naranja */
        }

        .project-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .project-title {
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--text-main);
            transition: color 0.3s ease;
        }
        
        /* El título también cambia ligeramente de color en hover */
        .project-card:hover .project-title {
            color: #fff;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 480px;
        }

        .project-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            margin-left: 1.5rem;
        }

        .project-lang {
            font-size: 0.8rem;
            font-weight: 600;
            /* COLOR EN ETIQUETA DE LENGUAJE */
            color: #000; /* Texto oscuro para contraste */
            background: var(--accent-color);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* --- Tech Tags --- */
        .tech-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .tech-tag {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid var(--border-muted);
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            cursor: default;
            background-color: rgba(255,255,255,0.02);
        }

        .tech-tag:hover {
            /* COLOR EN ETIQUETAS DE TECNOLOGÍA */
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(255, 159, 67, 0.03);
            transform: scale(1.03);
        }

        /* --- Footer --- */
        footer {
            margin-top: 6rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--border-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
